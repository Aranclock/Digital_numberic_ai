<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digit AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h2>숫자 그리기</h2>
  <canvas id="canvas" width="64" height="64"
    style="touch-action:none; border:2px solid black; width:300px; height:300px;"></canvas>
  <br><br>

  <button onclick="predict()">예측</button>
  <button onclick="clearCanvas()">지우기</button>

  <h3 id="result">결과: ?</h3>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, 64, 64);

    // 그리기 설정
ctx.lineCap = "round";
ctx.lineJoin = "round";

let drawing = false;
let lastPos = null;

// 좌표 계산 함수 (핵심🔥)
function getPos(e) {
  const rect = canvas.getBoundingClientRect();

  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  } else {
    return {
      x: e.offsetX,
      y: e.offsetY
    };
  }
}

// 시작
canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  drawing = true;
});

// 끝
canvas.addEventListener("mouseup", () => {
  drawing = false;
  lastPos = null;
});

canvas.addEventListener("touchend", () => {
  drawing = false;
  lastPos = null;
});

// 이동
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  draw(e);
});

// 그리기
    
function draw(e) {
  if (!drawing) return;

  const pos = getPos(e);
  ctx.strokeStyle = "white";
  ctx.lineWidth = 10;

  	if (lastPos) {
  	  ctx.beginPath();
      ctx.moveTo(lastPos.x, lastPos.y);
	    ctx.lineTo(pos.x, pos.y);
	    ctx.stroke();
    }
  
  	lastPos = pos;
  }

    function clearCanvas() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, 64, 64);
    }

    let model;
    let isModelReady = false;

    async function loadModel() {
      model = await tf.loadLayersModel(
        "https://storage.googleapis.com/tfjs-models/tfjs/mnist/model.json"
      );
      isModelReady = true;
    }

    loadModel();

    async function predict() {
      if (!isModelReady) {
        alert("AI 로딩 중... 잠깐 기다려줘!");
        return;
      }

      const imageData = ctx.getImageData(0, 0, 64, 64);

      let tensor = tf.browser.fromPixels(imageData, 1)
        .resizeNearestNeighbor([28, 28])
        .toFloat()
        .div(255.0)
        .expandDims();

      const prediction = model.predict(tensor);
      const result = prediction.argMax(1).dataSync()[0];

      document.getElementById("result").innerText = "결과: " + result;
    }
  </script>

</body>
</html>
